<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .outer-wrap {
            position: fixed;
            inset: 0;
            background: #cce0ff;
            border-radius: 40px;
            overflow: hidden;
            padding: 10px;
        }

        .list-wrap {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
            overflow-y: auto;
            padding: 4px 4px;
        }

            .list-wrap::-webkit-scrollbar {
                width: 5px;
            }

            .list-wrap::-webkit-scrollbar-track {
                background: transparent;
            }

            .list-wrap::-webkit-scrollbar-thumb {
                background: #b0b8cc;
                border-radius: 99px;
            }

        .btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 18px;
            border-radius: 18px;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: filter .15s;
            user-select: none;
        }

            .btn:hover {
                filter: brightness(.96);
            }

            .btn:active {
                filter: brightness(.90);
            }

            .btn.available {
                background: #ffffff;
                border-color: #d0d8e8;
            }

            .btn.connecting {
                background: #c0c0c0;
                border-color: #a8a8a8;
            }

            .btn.connected {
                background: #d8f5d8;
                border-color: #a0d8a0;
            }

        .name {
            flex: 1;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: .05em;
            color: #1a1a1a;
        }

        .status-icon {
            flex-shrink: 0;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes hg-flip {
            0% {
                transform: rotate(0deg);
            }

            35% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(180deg);
            }

            85% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .hg-spin {
            display: inline-flex;
            animation: hg-flip 4s ease-in-out infinite;
            transform-origin: center center;
        }
    </style>
</head>

        const stateIcon = { available: wifiAvailable, connecting: hourglassIcon, connected: wifiConnected };

        // ─── Referencia global a htmlComponent ────────────────────────────────
        let _html = null;

        // ─── Render list ───────────────────────────────────────────────────────
        function renderList(devices) {
            const list = document.getElementById('device-list');
            list.innerHTML = '';
            devices.forEach((d, i) => {
                const state = d.state || 'available';
                const btn = document.createElement('div');
                btn.className = 'btn ' + state;
                btn.innerHTML = `
          <div style="flex-shrink:0">${gogglesIcon}</div>
          <span class="name">${d.name}</span>
          <div class="status-icon">${stateIcon[state] || wifiAvailable}</div>
        `;
                btn.addEventListener('click', function () {
                    if (_html) {
                        _html.sendEventToMATLAB('ButtonClicked', { name: d.name, index: i + 1, state: state });
                    }
                });
                list.appendChild(btn);
            });
        }

        // ─── MATLAB → HTML bridge ─────────────────────────────────────────────
        function setup(htmlComponent) {
            _html = htmlComponent;
            htmlComponent.addEventListener('DataChanged', function (event) {
                const data = htmlComponent.Data;

                // Array de nombres → lista completa en estado available
                if (Array.isArray(data)) {
                    renderList(data.map(name => ({ name: name, state: 'available' })));
                    return;
                }

                // Un solo string (MATLAB escalar)
                if (typeof data === 'string') {
                    renderList([{ name: data, state: 'available' }]);
                    return;
                }

                // Cambiar estado de un botón concreto
                // MATLAB: html.Data = struct('action','setState','name','ESP_HORUS_1','state','connected')
                if (data && data.action === 'setState') {
                    const btns = document.querySelectorAll('.btn');
                    btns.forEach(btn => {
                        const nameEl = btn.querySelector('.name');
                        if (nameEl && nameEl.textContent === data.name) {
                            btn.className = 'btn ' + data.state;
                            btn.querySelector('.status-icon').innerHTML = stateIcon[data.state] || wifiAvailable;
                        }
                    });
                }
            });
        }

        // ─── Demo mientras no hay MATLAB ──────────────────────────────────────
        renderList([
            { name: 'ESP_HORUS_1', state: 'available' },
            { name: 'ESP_HORUS_2', state: 'connecting' },
            { name: 'ESP_HORUS_3', state: 'connected' },
        ]);
    </script>
