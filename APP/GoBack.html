<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            scrollbar-width: none;
        }

            html::-webkit-scrollbar,
            body::-webkit-scrollbar {
                display: none;
            }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            /* ocupa el menor lado del iframe para ser siempre circular */
            width: 90vmin;
            height: 90vmin;
            cursor: pointer;
            background: none;
            border: none;
            outline: none;
            padding: 0;
            -webkit-appearance: none;
        }

            /* círculo semitransparente — invisible por defecto */
            .btn-wrap::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 50%;
                background: rgba(69, 76, 99, 0.12);
                transform: scale(0.5);
                opacity: 0;
                transition: opacity 0.18s ease, transform 0.18s ease;
                pointer-events: none;
            }

            /* aparece en hover */
            .btn-wrap:hover::before {
                opacity: 1;
                transform: scale(1);
            }

            /* más opaco y flecha más pequeña al hacer clic */
            .btn-wrap:active::before {
                opacity: 1;
                transform: scale(1);
                background: rgba(69, 76, 99, 0.22);
            }

            .btn-wrap:active .arrow-icon {
                transform: scale(0.78);
            }

        /* la flecha */
        .arrow-icon {
            width: 55%;
            height: 55%;
            fill: #ff6a6a;
            transition: transform 0.15s ease;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <button class="btn-wrap" id="mainBtn">
        <svg class="arrow-icon" viewBox="0 0 869.959 869.958"
             xmlns="http://www.w3.org/2000/svg">
            <path d="M146.838,484.584c10.271,10.395,23.804,15.6,37.347,15.6c13.329,0,26.667-5.046,36.897-15.155
      c20.625-20.379,20.825-53.62,0.445-74.245l-41.688-42.191h423.78c88.963,0,161.34,72.376,161.34,161.339v4.32
      c0,43.096-16.782,83.61-47.255,114.084c-20.503,20.502-20.503,53.744,0,74.246c10.251,10.251,23.688,15.377,37.123,15.377
      c13.435,0,26.872-5.125,37.123-15.377c50.305-50.306,78.009-117.188,78.009-188.331v-4.32
      c0-71.142-27.704-138.026-78.009-188.331c-50.306-50.305-117.189-78.009-188.331-78.009h-424.99l42.25-41.747
      c20.625-20.379,20.825-53.62,0.445-74.245c-20.376-20.624-53.618-20.825-74.244-0.445L15.601,277.068
      c-9.905,9.787-15.517,23.107-15.6,37.03c-0.084,13.924,5.367,27.31,15.154,37.215L146.838,484.584z" />
        </svg>
    </button>

    <script type="text/javascript">
        var _id = "";

        function setup(htmlComponent) {
            htmlComponent.addEventListener("DataChanged", function () {
                if (htmlComponent.Data && htmlComponent.Data.id) {
                    _id = htmlComponent.Data.id;
                }
            });

            document.getElementById("mainBtn").addEventListener("click", function () {
                htmlComponent.sendEventToMATLAB("buttonClicked", { id: _id });
            });
        }
    </script>

</body>
</html>
