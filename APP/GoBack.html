<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2vw;
            background-color: #CC0000;
            border: none;
            border-radius: 50vmin;
            width: 96%;
            height: 86%;
            padding: 0 4vw 0 1.5vw;
            cursor: pointer;
            transition: background-color 0.18s ease, transform 0.1s ease;
        }

            .back-btn:hover {
                background-color: #AA0000;
            }

            .back-btn:active {
                transform: scale(0.96);
                background-color: #880000;
            }

        .circle {
            /* usa vh para que no desborde el alto del botón */
            width: 7vh;
            height: 7vh;
            min-width: 20px;
            min-height: 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

            .circle svg {
                width: 55%;
                height: 55%;
            }

        .label {
            color: white;
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 9vw; /* escala con el ANCHO del iframe */
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <button class="back-btn" id="matlab-btn">
        <span class="circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#CC0000" stroke-width="3"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </span>
        <span class="label">BACK</span>
    </button>

    <script type="text/javascript">
        var _id = "";

        function setup(htmlComponent) {
            htmlComponent.addEventListener("DataChanged", function () {
                if (htmlComponent.Data && htmlComponent.Data.id) {
                    _id = htmlComponent.Data.id;
                }
            });

            document.getElementById("matlab-btn").addEventListener("click", function () {
                htmlComponent.sendEventToMATLAB("buttonClicked", { id: _id });
            });
        }
    </script>

</body>
</html>
