<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* uihtml monta el HTML en un iframe — html y body deben llenar ese iframe */
        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #svg-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            /* El SVG ocupa todo el espacio disponible manteniendo proporciones */
            #svg-wrapper svg {
                width: 100%;
                height: 100%;
                /* preserveAspectRatio se encarga de no deformar el icono */
            }

        /* ── Animación conecting: pulso desfasado por capa ── */
        @keyframes pulse-dark {
            0%, 100% {
                fill: #000000;
            }

            50% {
                fill: #BFBFBF;
            }
        }

        @keyframes pulse-light {
            0%, 100% {
                fill: #BFBFBF;
            }

            50% {
                fill: #000000;
            }
        }

        .anim-wave-outer {
            animation: pulse-dark 1.4s ease-in-out infinite 0s;
        }

        .anim-wave-mid {
            animation: pulse-light 1.4s ease-in-out infinite 0.35s;
        }

        .anim-wave-inner {
            animation: pulse-dark 1.4s ease-in-out infinite 0.70s;
        }

        .anim-dot {
            animation: pulse-light 1.4s ease-in-out infinite 1.05s;
        }
    </style>
</head>
<body>
    <div id="svg-wrapper"></div>

    <script>
        // ════════════════════════════════════════════════════
        //  TUS 4 SVGs EMBEBIDOS
        // ════════════════════════════════════════════════════

</g>

            errorconect: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<g id="System / Wifi_Problem">

            // fill-based: 4 paths con IDs renombrados para las clases de animación
            conecting: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

        };

        // ════════════════════════════════════════════════════
        //  COLORES FIJOS POR ESTADO (attr + valor)
        //  conectado/desconectado/errorconect → stroke en #Vector
        //  conecting → sin color fijo, usa animación CSS
        // ════════════════════════════════════════════════════

        const COLORES = {
            conectado: { attr: 'stroke', color: '#7FFF00' },   // verde lima
            desconectado: { attr: 'stroke', color: '#808080' },   // gris apagado
            errorconect: { attr: 'stroke', color: '#FF3333' },   // rojo
            conecting: null                                     // animación
        };

        // Clase CSS para cada path del SVG conecting
        const ANIM_CLASSES = {
            'wave-outer': 'anim-wave-outer',
            'wave-mid': 'anim-wave-mid',
            'wave-inner': 'anim-wave-inner',
            'dot': 'anim-dot'
        };

        // ════════════════════════════════════════════════════
        //  ALIAS: mensaje MATLAB → clave interna
        // ════════════════════════════════════════════════════

        const ALIAS = {
            'conectado': 'conectado',
            'connected': 'conectado',
            'conected': 'conectado',
            'ok': 'conectado',
            '3': 'conectado',

            'desconectado': 'desconectado',
            'desconect': 'desconectado',
            'disconnect': 'desconectado',
            'off': 'desconectado',
            '1': 'desconectado',

            'errorconect': 'errorconect',
            'error': 'errorconect',
            'err': 'errorconect',
            '2': 'errorconect',

            'conecting': 'conecting',
            'connecting': 'conecting',
            'conectando': 'conecting',
            '4': 'conecting',
        };

        // ════════════════════════════════════════════════════
        //  RENDER
        // ════════════════════════════════════════════════════

        let estadoActual = null;
        const wrapper = document.getElementById('svg-wrapper');

        function aplicarEstado(clave) {
            if (!SVGS[clave] || clave === estadoActual) return;
            estadoActual = clave;

            wrapper.innerHTML = SVGS[clave];
            const svg = wrapper.querySelector('svg');

            if (clave === 'conecting') {
                // Añade clases de animación a cada path por ID
                Object.entries(ANIM_CLASSES).forEach(([id, cls]) => {
                    const el = svg.querySelector('#' + id);
                    if (el) el.classList.add(cls);
                });
            } else {
                // Aplica color fijo al path #Vector (stroke)
                const cfg = COLORES[clave];
                const vector = svg.querySelector('#Vector');
                if (vector && cfg) vector.setAttribute(cfg.attr, cfg.color);
            }
        }

        function procesarMensaje(msg) {
            if (typeof msg !== 'string') return;
            const clave = ALIAS[msg.toLowerCase().trim()];
            if (clave) aplicarEstado(clave);
        }

        // Estado inicial
        aplicarEstado('desconectado');

        // ════════════════════════════════════════════════════
        //  ESCUCHAR MENSAJES DE MATLAB
        //  Patrón oficial uihtml:
        //    - MATLAB escribe:  app.WifiStatusHTML.Data = 'conectado'
        //    - HTML escucha:    htmlComponent.addEventListener("DataChanged", ...)
        //    - HTML lee:        htmlComponent.Data
        // ════════════════════════════════════════════════════

        function setup(htmlComponent) {
            // Escucha cada vez que MATLAB cambia .Data
            htmlComponent.addEventListener("DataChanged", function (event) {
                var state = htmlComponent.Data;
                console.log('[MATLAB->HTML] Data recibida:', state);
                procesarMensaje(state);
            });
        }

        // Testing en navegador: window.setWifiStatus('conectado')
        window.setWifiStatus = procesarMensaje;
    </script>
</body>
</html>
