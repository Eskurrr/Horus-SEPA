<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            display: flex;
            align-items: stretch;
            justify-content: stretch;
        }

        .buscar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4em;
            background-color: #a8c4f0;
            color: #6a06b3;
            border: none;
            border-radius: 18px;
            font-weight: bold;
            font-family: Georgia, 'Times New Roman', serif;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.15s ease, transform 0.1s ease;
            width: 100%;
            height: 100%;
            font-size: 16px;
        }

            .buscar-btn:hover {
                background-color: #90b4ec;
            }

            .buscar-btn:active {
                background-color: #7aa4e8;
                transform: scale(0.98);
            }

            .buscar-btn svg {
                width: 1.2em;
                height: 1.2em;
                fill: #6a06b3;
                flex-shrink: 0;
            }
    </style>
</head>
<body>

    </button>

    <script>
        const btn = document.getElementById('btn');

        // Escala el texto e icono según el tamaño real del botón
        function adjustFontSize() {
            const w = btn.offsetWidth;
            const h = btn.offsetHeight;
            const size = Math.min(w * 0.10, h * 0.38);
            btn.style.fontSize = size + 'px';
        }

        window.addEventListener('load', adjustFontSize);

        if (window.ResizeObserver) {
            new ResizeObserver(adjustFontSize).observe(btn);
        } else {
            window.addEventListener('resize', adjustFontSize);
        }

        function setup(htmlComponent) {
            btn.addEventListener('click', function () {
                htmlComponent.sendEventToMATLAB('ButtonClicked');
            });
        }
    </script>

</html>
